<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>зҷ»еҪ•</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>зҷ»еҪ•</h2>
        <input type="text" id="username" placeholder="з”ЁжҲ·еҗҚ">
        <input type="password" id="password" placeholder="еҜҶз Ғ">
        <button onclick="login()">зҷ»еҪ•</button>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            })
            .then(response => response.text())
            .then(text => alert(text))
            .catch(err => alert('зҪ‘з»ңй”ҷиҜҜ: ' + err));
        }
    </script>
</body>
</html>
